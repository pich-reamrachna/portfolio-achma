<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 130" role="img" aria-label="Comic speech banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#181a1f"/>
      <stop offset="1" stop-color="#080a0f"/>
    </linearGradient>
    <pattern id="scan" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(-28)">
      <rect width="12" height="12" fill="transparent"/>
      <rect width="6" height="12" fill="#ffffff" fill-opacity="0.06"/>
    </pattern>
    <filter id="glow" x="-20%" y="-40%" width="140%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#9feeff" flood-opacity="0.45"/>
    </filter>
  </defs>

  <polygon points="56,16 520,10 548,40 536,52 540,108 74,122 24,102 36,84 18,68 34,48 10,34"
           fill="#ffffff" filter="url(#glow)"/>

  <polygon points="64,22 512,16 538,42 526,52 530,102 80,114 32,98 44,82 26,68 42,50 20,38"
           fill="url(#bg)"/>
  <polygon points="64,22 512,16 538,42 526,52 530,102 80,114 32,98 44,82 26,68 42,50 20,38"
           fill="url(#scan)" opacity="0.55"/>

  <polygon points="24,18 132,2 152,34 40,44" fill="#ffffff"/>
  <polygon points="36,20 124,9 138,30 46,36" fill="#07080c"/>

  <polygon points="486,76 558,48 546,28 456,66" fill="#ffffff"/>
  <polygon points="494,72 548,51 540,36 470,66" fill="#07080c"/>
</svg>
